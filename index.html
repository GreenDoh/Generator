<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f9f2e7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NameGen">
    <link rel="manifest" href="manifest.json">
    <title>✨ Генератор имён | PWA приложение</title>
    <!-- Google Fonts для эстетики и шрифта -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (бесплатные иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f9f2e7 0%, #ffe6f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* декоративные размытые круги */
        .blob {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255,190,200,0.4) 0%, rgba(210,160,255,0.2) 100%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }
        .blob-1 { top: -20vh; left: -10vw; }
        .blob-2 { bottom: -30vh; right: -15vw; background: radial-gradient(circle, rgba(170,210,255,0.4), rgba(255,220,180,0.2)); }

        .card {
            position: relative;
            z-index: 10;
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,240,0.6);
            padding: 2rem 2rem 2.5rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,245,0.7);
        }

        /* хедер */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,240,0.7);
            backdrop-filter: blur(4px);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #b45f6b;
            border: 1px solid rgba(255,200,180,0.6);
            margin-bottom: 1rem;
        }
        .badge i {
            font-size: 0.9rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2D2F36, #8B5F6C);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.01em;
        }
        .sub {
            color: #6f5b62;
            margin-top: 0.6rem;
            font-weight: 400;
            font-size: 0.95rem;
        }

        /* главный дисплей с именем */
        .name-display {
            background: white;
            border-radius: 44px;
            padding: 2rem 1rem;
            text-align: center;
            margin-bottom: 1.8rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255,255,255,0.8);
            border: 1px solid #fff6f0;
        }
        .generated-name {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            word-break: break-word;
            background: linear-gradient(145deg, #2c2c36, #4b3b42);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
        }
        @media (max-width: 500px) {
            .generated-name { font-size: 1.9rem; }
            .card { padding: 1.5rem; }
        }
        .name-hint {
            font-size: 0.75rem;
            color: #a48a8f;
            margin-top: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* кнопки управления */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .btn {
            border: none;
            background: rgba(245, 240, 235, 0.9);
            padding: 0.8rem 1.6rem;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
            color: #3d2e33;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,250,240,0.8);
        }
        .btn-primary {
            background: linear-gradient(105deg, #fdc8d4, #ffb7c5);
            color: #2d2326;
            box-shadow: 0 6px 14px rgba(255, 150, 170, 0.3);
            border: none;
        }
        .btn-primary i {
            color: #b15a6b;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            background: linear-gradient(105deg, #ffc1cf, #ffaaba);
            box-shadow: 0 12px 20px rgba(255, 130, 150, 0.35);
        }
        .btn-outline:hover {
            background: rgba(255, 245, 240, 0.95);
            transform: translateY(-2px);
            border-color: #ffbfb0;
        }
        .btn-outline:active, .btn-primary:active {
            transform: translateY(1px);
        }
        .copy-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #2c2a2eef;
            backdrop-filter: blur(12px);
            color: white;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.85rem;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .copy-toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* стилизация опций — только стиль */
        .options {
            background: rgba(250, 245, 240, 0.6);
            border-radius: 36px;
            padding: 1.2rem 1.5rem;
            margin-top: 0.5rem;
            text-align: center;
        }
        .style-selector {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }
        .option-label {
            font-weight: 600;
            color: #594e52;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,240,235,0.7);
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }
        .style-buttons {
            display: flex;
            gap: 12px;
            background: #f0e9e4;
            padding: 6px;
            border-radius: 100px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .style-option {
            background: transparent;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            color: #5e4b51;
        }
        .style-option.active {
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            color: #b25268;
            font-weight: 700;
        }
        .footer-info {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.8rem;
            color: #b2959f;
        }
        .install-banner {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 0.8rem 1.2rem;
            color: white;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            font-size: 0.85rem;
            font-weight: 500;
            gap: 12px;
            flex-wrap: wrap;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .install-banner.show {
            display: flex;
        }
        .install-btn {
            background: white;
            color: #b45f6b;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        i {
            pointer-events: none;
        }
        @media (max-width: 550px) {
            .install-banner {
                flex-direction: column;
                text-align: center;
                border-radius: 28px;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
    <div class="header">
        <div class="badge">
            <i class="fas fa-magic"></i> <span>PWA · работает офлайн</span>
        </div>
        <h1>✨ Генератор ника</h1>
        <div class="sub">Создай запоминающийся username для игр, соцсетей или творчества</div>
    </div>

    <div class="name-display">
        <div class="generated-name" id="usernameDisplay">lunar_whisper</div>
        <div class="name-hint">
            <i class="fas fa-sync-alt" style="font-size: 0.7rem;"></i> <span>нажми «🎲 Случайный» или сгенерируй новый</span>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn btn-primary" id="generateBtn">
            <i class="fas fa-dice-d6"></i> Случайное имя
        </button>
        <button class="btn btn-outline" id="copyBtn">
            <i class="far fa-copy"></i> Копировать
        </button>
        <button class="btn btn-outline" id="refreshBtn">
            <i class="fas fa-arrows-rotate"></i> Другое
        </button>
    </div>

    <div class="options">
        <div class="style-selector">
            <span class="option-label"><i class="fas fa-palette"></i> Выберите стиль ника</span>
            <div class="style-buttons" id="styleGroup">
                <button data-style="cute" class="style-option active">🌸 Милый</button>
                <button data-style="edgy" class="style-option">🌙 Дерзкий</button>
                <button data-style="tech" class="style-option">⚡ Техно</button>
            </div>
        </div>
        <div class="footer-info">
            <i class="fas fa-shield-alt"></i> тысячи уникальных комбинаций • меняйте стиль для нового настроения
        </div>
    </div>
</div>

<div id="toastMsg" class="copy-toast">
    <i class="fas fa-check-circle"></i> <span>Скопировано!</span>
</div>
<div id="installBanner" class="install-banner">
    <span><i class="fas fa-download"></i> Установите приложение</span>
    <button id="installAppBtn" class="install-btn">Установить</button>
</div>

<script>
    (function(){
        // ---------- БОЛЬШАЯ БИБЛИОТЕКА СЛОВ ДЛЯ ГЕНЕРАЦИИ ----------
        const dictionaries = {
            cute: {
                prefixes: ["luna", "bunny", "cookie", "puff", "peach", "sunny", "honey", "dream", "star", "fairy", "twinkle", "berry", "velvet", "sugar", "glitter", "petal", "mochi", "bubbles", "choco", "vanilla", "mellow", "blossom", "cotton", "sprinkle", "cupcake"],
                suffixes: ["paw", "wink", "smile", "glow", "bloom", "fluff", "sparkle", "heart", "kiss", "dew", "mellow", "bun", "cake", "puff", "pop", "dolly", "pie", "bean", "snuggle", "sweet", "cloud", "muffin", "biscuit", "hug", "joy"],
                connectors: ["_", ".", ""],
                numbers: ["", "1", "2", "3", "7", "99", "x", "o", "4", "8"]
            },
            edgy: {
                prefixes: ["shadow", "void", "raven", "crimson", "phantom", "night", "fury", "wicked", "storm", "chaos", "vengeance", "silent", "obsidian", "nox", "inferno", "reaper", "hollow", "dark", "ashen", "frost", "midnight", "vengeful", "fallen", "cursed", "wicked"],
                suffixes: ["bane", "fang", "claw", "wrath", "shade", "ghost", "hunter", "rebel", "knight", "eclipse", "havoc", "rune", "doom", "sorrow", "zero", "edge", "soul", "crypt", "vex", "slayer", "mancer", "reaver", "spite", "gloom", "hex"],
                connectors: ["_", "-", ""],
                numbers: ["", "x", "z", "47", "13", "00", "666", "7", "99", "0x"]
            },
            tech: {
                prefixes: ["cyber", "pixel", "data", "nexus", "vector", "codex", "bit", "neon", "quantum", "alpha", "beta", "zero", "sync", "echo", "poly", "grid", "logic", "crypto", "fiber", "meta", "nano", "digital", "hyper", "byte", "axon"],
                suffixes: ["wave", "core", "drive", "link", "node", "script", "frame", "loop", "sys", "craft", "ware", "net", "flux", "byte", "radix", "shell", "stack", "hash", "token", "array", "code", "ping", "packet", "proxy", "cache"],
                connectors: ["_", ".", ""],
                numbers: ["", "01", "42", "404", "0x", "7", "99", "2k", "10", "808"]
            }
        };

        let currentStyle = "cute";
        const usernameSpan = document.getElementById("usernameDisplay");
        const generateBtn = document.getElementById("generateBtn");
        const refreshBtn = document.getElementById("refreshBtn");
        const copyBtn = document.getElementById("copyBtn");
        const styleOptions = document.querySelectorAll(".style-option");
        const toast = document.getElementById("toastMsg");
        
        // PWA установка
        let deferredPrompt = null;
        const installBanner = document.getElementById("installBanner");
        const installBtn = document.getElementById("installAppBtn");

        function showToast(message = "Скопировано!") {
            const toastSpan = toast.querySelector("span");
            if(toastSpan) toastSpan.innerText = message;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 1800);
        }

        function randomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateUsername() {
            const dict = dictionaries[currentStyle];
            if(!dict) return "cool_user";
            
            const useNumber = Math.random() < 0.35;
            let prefix = randomItem(dict.prefixes);
            let suffix = randomItem(dict.suffixes);
            let connector = randomItem(dict.connectors);
            
            let rawName = prefix + connector + suffix;
            
            if(useNumber) {
                let numPart = randomItem(dict.numbers);
                if(numPart !== "") {
                    rawName = rawName + numPart;
                } else {
                    let fallbackNum = Math.floor(Math.random() * 99) + 1;
                    rawName = rawName + fallbackNum;
                }
            }
            
            if(Math.random() < 0.12 && rawName.length < 20) {
                const extraSymbols = ["_", ".", "-"];
                let sym = randomItem(extraSymbols);
                let extraNum = Math.floor(Math.random() * 10);
                rawName = rawName + sym + extraNum;
            }
            
            if(rawName.length > 22) {
                rawName = rawName.slice(0, 20);
                if(rawName.endsWith("_") || rawName.endsWith("-") || rawName.endsWith(".")) {
                    rawName = rawName.slice(0, -1);
                }
            }
            return rawName;
        }

        let currentGeneratedName = "";

        function updateNameAndStore() {
            const newName = generateUsername();
            currentGeneratedName = newName;
            usernameSpan.innerText = newName;
            usernameSpan.style.transform = "scale(0.98)";
            setTimeout(() => { if(usernameSpan) usernameSpan.style.transform = "scale(1)"; }, 100);
            return newName;
        }

        async function copyToClipboard() {
            if(!currentGeneratedName || currentGeneratedName.trim() === "") {
                currentGeneratedName = usernameSpan.innerText;
            }
            try {
                await navigator.clipboard.writeText(currentGeneratedName);
                showToast(`📋 "${currentGeneratedName}" скопировано!`);
            } catch(err) {
                const textarea = document.createElement("textarea");
                textarea.value = currentGeneratedName;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand("copy");
                document.body.removeChild(textarea);
                showToast(`✔️ Скопировано: ${currentGeneratedName}`);
            }
        }

        function setStyle(style) {
            if(style === currentStyle) return;
            currentStyle = style;
            styleOptions.forEach(btn => {
                const btnStyle = btn.getAttribute("data-style");
                if(btnStyle === style) {
                    btn.classList.add("active");
                } else {
                    btn.classList.remove("active");
                }
            });
            updateNameAndStore();
        }

        function bindEvents() {
            generateBtn.addEventListener("click", () => updateNameAndStore());
            refreshBtn.addEventListener("click", () => updateNameAndStore());
            copyBtn.addEventListener("click", copyToClipboard);
            
            styleOptions.forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const newStyle = btn.getAttribute("data-style");
                    if(newStyle) setStyle(newStyle);
                });
            });
        }
        
        // PWA: слушаем событие beforeinstallprompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (installBanner) installBanner.classList.add('show');
        });

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        showToast('🚀 Приложение установлено!');
                    }
                    deferredPrompt = null;
                    installBanner.classList.remove('show');
                } else {
                    // если браузер не поддерживает, показываем инструкцию
                    showToast('Установите вручную через меню браузера: "Добавить на экран"');
                }
            });
        }

        // Регистрация Service Worker для работы офлайн
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker зарегистрирован: ', registration.scope);
                }).catch(error => {
                    console.log('Ошибка регистрации SW: ', error);
                });
            });
        }

        function init() {
            bindEvents();
            currentStyle = "cute";
            styleOptions.forEach(btn => {
                if(btn.getAttribute("data-style") === "cute") btn.classList.add("active");
                else btn.classList.remove("active");
            });
            updateNameAndStore();
        }
        
        init();
    })();
</script>
<script>
    // Создаём манифест и service worker динамически для полноценной PWA
    (function setupPWA() {
        // Манифест JSON
        const manifestObj = {
            name: "Генератор имён",
            short_name: "NameGen",
            description: "Красивый генератор уникальных имён пользователя с выбором стиля",
            start_url: "/",
            display: "standalone",
            theme_color: "#f9f2e7",
            background_color: "#f9f2e7",
            icons: [
                {
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffb7c5'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='%234b3b42' font-weight='bold'%3E✨%3C/text%3E%3C/svg%3E",
                    sizes: "any",
                    type: "image/svg+xml",
                    purpose: "any maskable"
                },
                {
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffb7c5'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='%234b3b42' font-weight='bold'%3E✨%3C/text%3E%3C/svg%3E",
                    sizes: "192x192",
                    type: "image/svg+xml"
                },
                {
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffb7c5'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='%234b3b42' font-weight='bold'%3E✨%3C/text%3E%3C/svg%3E",
                    sizes: "512x512",
                    type: "image/svg+xml"
                }
            ]
        };
        const manifestJSON = JSON.stringify(manifestObj);
        const blobManifest = new Blob([manifestJSON], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blobManifest);
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = manifestURL;
        document.head.appendChild(manifestLink);

        // Service Worker code
        const swCode = `
            const CACHE_NAME = 'username-gen-v1';
            const urlsToCache = [
                './',
                './index.html',
                'https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap',
                'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css'
            ];
            self.addEventListener('install', event => {
                event.waitUntil(
                    caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))
                );
            });
            self.addEventListener('fetch', event => {
                event.respondWith(
                    caches.match(event.request).then(response => response || fetch(event.request))
                );
            });
            self.addEventListener('activate', event => {
                event.waitUntil(
                    caches.keys().then(keys => Promise.all(
                        keys.filter(key => key !== CACHE_NAME).map(key => caches.delete(key))
                    ))
                );
            });
        `;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        const swURL = URL.createObjectURL(swBlob);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swURL).then(reg => {
                console.log('Dynamic SW registered', reg);
            }).catch(err => console.log('SW failed', err));
        }
    })();
</script>
</body>
</html>
